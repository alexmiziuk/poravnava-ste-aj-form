<!DOCTYPE html>
<html lang="sl">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
</head>
<title>Document</title>
</head>

<body>
	<div class="os-modal-overlay">
		<div class="os-modal-container">

			<button class="os-modal-close" aria-label="Zapri">
				<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" class="os-icon-close">
					<g clip-path="url(#clip0_710_569)">
						<path d="M15.625 4.375L4.375 15.625" stroke="currentColor" stroke-width="2" stroke-linecap="round"
							stroke-linejoin="round" />
						<path d="M15.625 15.625L4.375 4.375" stroke="currentColor" stroke-width="2" stroke-linecap="round"
							stroke-linejoin="round" />
					</g>
					<defs>
						<clipPath id="clip0_710_569">
							<rect width="20" height="20" fill="white" />
						</clipPath>
					</defs>
				</svg>
			</button>

			<div class="os-modal-header">
				<h2 class="os-title">Brezplačna analiza vaše situacije</h2>
				<p class="os-subtitle">
					Izpolnite spodnji obrazec in naši pravni svetovalci vas bodo kontaktirali v najkrajšem možnem času.
				</p>
			</div>

			<form class="os-form" id="os-stecaj-form">

				<div class="os-input-group">
					<input type="text" class="os-input" name="full_name" placeholder="Ime in priimek" required>
				</div>

				<div class="os-input-group">
					<input type="tel" class="os-input" name="phone" placeholder="Telefonska številka" required>
				</div>

				<div class="os-input-group">
					<input type="email" class="os-input" name="email" placeholder="E-poštni naslov" required>
				</div>

				<div class="os-input-group">
					<input type="text" class="os-input" name="location" placeholder="Kraj bivanja" required>
				</div>

				<div class="os-input-group">

					<div class="os-select-wrapper">
						<svg class="os-select-icon" width="22" height="12" viewBox="0 0 22 12" fill="none"
							xmlns="http://www.w3.org/2000/svg">
							<path d="M21 1L11 11L1 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"
								stroke-linejoin="round" />
						</svg>
						<select class="os-select" name="job_status" id="os-job-status">
							<option value="" disabled selected>Status zaposlitve</option>
							<option value="status">Status zaposlitve</option>
							<option value="employed">Zaposlen</option>
							<option value="unemployed">Brezposeln</option>
						</select>
					</div>
				</div>

				<div id="os-dynamic-fields-container"></div>

				<button type="submit" class="os-submit-btn">Oddaj povpraševanje</button>
			</form>

			<div class="os-modal-footer">
				<span class="os-security-info">
					<img src="assets/img/icon-private.svg" alt="Lock" class="os-icon-lock">
					Vaši podatki so varni in ne bodo posredovani tretjim osebam.
				</span>
			</div>

		</div>
	</div>

</body>

</html>
